services:
  redis:
    image: redis:7-alpine
    container_name: crash-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - crash-net

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: crash-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - crash-net

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: crash-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: crash
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: changeme
    restart: unless-stopped
    networks:
      - crash-net

volumes:
  redis_data:
  clickhouse_data:

networks:
  crash-net:
    driver: bridge